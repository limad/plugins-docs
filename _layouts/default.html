<!DOCTYPE html>
<html lang="{{page.lang}}">

<head>
	<meta charset="UTF-8">
	<title>Documentation Jeedom | {{page.title}}</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Content-Language" content="{{ page.lang }}">

	<link rel="icon" type="image/png" href="{{site.baseurl}}/favicon.ico">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

	<link rel="stylesheet" href="{{site.baseurl}}/assets/css/materialize.css">
	<link rel="stylesheet" href="{{site.baseurl}}/assets/css/styles.css">

</head>

<body>

	<div class="navbar-fixed hide-on-print">
		<nav>
			<div class="nav-wrapper">

				<a id="logo-container" class="brand-logo center">
					<img src="{{site.market}}/filestore/market/plugin/images/{{page.pluginId}}_icon.png"
						class="nav-logo responsive-img" alt="Plugin icon">
				</a>

				<ul class="left hide-on-med-and-down">
					<li><a href="{{site.baseurl}}">Limad44 Documentation</a></li>
					<li>> {{page.title}}</li>
				</ul>

				<a href="{{site.doc}}" data-activates="nav-mobile"
					class="button-collapse btn-floating btn-large waves-effect waves-light jeedomcolorbg">
					<i class="material-icons">menu</i>
				</a>

				<ul class="right hide-on-med-and-down">
					<li><a href="{{site.www}}">Site</a></li>
					<li><a href="{{site.blog}}">Blog</a></li>
					<li><a href="{{site.forum}}">Community</a></li>
					<li><a href="{{site.market}}">Market</a></li>
					<li class="active"><a href="{{site.doc}}">Doc</a></li>
				</ul>

				<ul class="side-nav" id="nav-mobile">
					<li><a href="{{site.blog}}">Blog</a></li>
					<li><a href="{{site.forum}}">Community</a></li>
					<li><a href="{{site.market}}">Market</a></li>
					<li class="active"><a href="{{site.doc}}">Doc</a></li>
				</ul>

			</div>
		</nav>
	</div>


	<div id="div_main">

		<div id="side-nav" class="side-nav fixed hide-on-print">

			<div class="container">

				{% if site.langs.size >= 2 %}

				<div class="row">

					<div class="col s2">
						<i class="material-icons lang-icon">language</i>
					</div>

					<div class="col s10">

						<select class="sel_lang">

							{% for lang in site.langs %}

							<option value="{{ lang }}">

								{% if lang == "fr_FR" %}Français{% endif %}
								{% if lang == "en_US" %}English{% endif %}
								{% if lang == "ru_RU" %}Russe{% endif %}
								{% if lang == "de_DE" %}Deutsch{% endif %}
								{% if lang == "es_ES" %}Spanish{% endif %}
								{% if lang == "it_IT" %}Italien{% endif %}
								{% if lang == "id_ID" %}Indien{% endif %}

							</option>

							{% endfor %}

						</select>

					</div>

				</div>

				{% endif %}

			</div>

			<div id="div_summary" class="summary-sidebar"></div>

		</div>


		<div id="div_content">

			<i class="material-icons hide-on-print btn-scroll-up" id="bt_up">
				keyboard_arrow_up
			</i>

			{{content}}

		</div>

	</div>


	<script src="{{site.baseurl}}/assets/js/jquery-2.1.1.min.js"></script>
	<script src="{{site.baseurl}}/assets/js/materialize.min.js"></script>
	<script src="{{site.baseurl}}/assets/js/jquery.inview.min.js"></script>
	<script src="{{site.baseurl}}/assets/js/jquery.toc.js"></script>

</body>

</html>
