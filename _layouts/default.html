<!DOCTYPE html>
<html lang="{{page.lang}}">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Documentation Jeedom | {{page.title}}</title>
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet" href="{{site.baseurl}}/assets/css/materialize.css">
	<link rel="stylesheet" href="{{site.baseurl}}/assets/css/styles.css">
</head>

<body>
	<div class="navbar-fixed">
		<nav>
			<div class="nav-wrapper container">
				<a href="{{site.baseurl}}" class="brand-logo center">
					<img src="{{site.market}}/filestore/market/plugin/images/{{page.pluginId}}_icon.png"
						style="height:50px; margin-top:5px;" alt="Logo" />
				</a>
				<ul class="left hide-on-med-and-down">
					<li><a href="{{site.baseurl}}">Limad44</a></li>
					<li>> {{page.title}}</li>
				</ul>
				<a href="#" data-activates="nav-mobile" class="button-collapse"><i class="material-icons">menu</i></a>
				<ul class="right hide-on-med-and-down">
					<li class="active"><a href="{{site.doc}}">Doc</a></li>
				</ul>
			</div>
		</nav>
	</div>

	<ul class="side-nav" id="nav-mobile">
		<li><a href="{{site.baseurl}}">Accueil</a></li>
	</ul>

	<div id="div_main">
		<aside id="side-nav-doc">
			<div class="toc-title">{{page.title}}</div>
			<div id="div_summary"></div>
		</aside>

		<main id="div_content_wrapper">
			<div id="div_content">
				{{content}}
			</div>
			<i class="material-icons btn-scroll-up" id="bt_up">keyboard_arrow_up</i>
		</main>
	</div>

	<script src="{{site.baseurl}}/assets/js/jquery-2.1.1.min.js"></script>
	<script src="{{site.baseurl}}/assets/js/materialize.min.js"></script>
	<script src="{{site.baseurl}}/assets/js/jquery.toc.js"></script>
	<script>
		$(document).ready(function () {
			$(".button-collapse").sideNav();

			// Génération du sommaire
			$('#div_content').toc({
				renderIn: "#div_summary",
				selectors: 'h1,h2'
			});

			$('#bt_up').click(function () { $('html, body').animate({ scrollTop: 0 }, 400); });
		});
	</script>
</body>

</html>
