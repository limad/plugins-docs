<!DOCTYPE html>
<html lang="{{page.lang}}">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Content-Language" content="{{ page.lang }}">
	<meta name="description" content="Documentation du plugin {{ page.title }} pour Jeedom">
	<title>{{ page.title }} — Limad44 Documentation</title>
	<link rel="icon" type="image/png" href="{{site.baseurl}}/favicon.ico">
	<!-- Material Icons (sidebar icon + bt_up) -->
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<!-- Theme -->
	<link rel="stylesheet" href="{{site.baseurl}}/assets/css/styles.css">
</head>

<body>

	<!-- ── Navbar ─────────────────────────────────────────────────── -->
	<nav id="navbar" class="hide-on-print">
		<div class="nav-inner">

			<!-- Breadcrumb (left) -->
			<div class="nav-breadcrumb">
				<a href="{{site.baseurl}}">Limad44</a>
				<span class="sep">/</span>
				<span class="cur">{{ page.title }}</span>
			</div>

			<!-- Logo (center) -->
			<a class="nav-logo" href="{{site.baseurl}}">
				<img src="{{site.market}}/filestore/market/plugin/images/{{page.pluginId}}_icon.png"
					alt="{{ page.pluginId }}">
			</a>

			<!-- Links (right, desktop) -->
			<ul class="nav-links">
				<li><a href="{{site.www}}">Site</a></li>
				<li><a href="{{site.blog}}">Blog</a></li>
				<li><a href="{{site.forum}}">Community</a></li>
				<li><a href="{{site.market}}">Market</a></li>
				<li class="active"><a href="{{site.doc}}">Doc</a></li>
			</ul>

			<!-- Hamburger (mobile) -->
			<button id="nav-toggle" aria-label="Menu" aria-expanded="false">
				<span></span><span></span><span></span>
			</button>
		</div>
	</nav>

	<!-- Mobile drawer -->
	<div id="nav-drawer" aria-hidden="true">
		<a href="{{site.www}}">Site</a>
		<a href="{{site.blog}}">Blog</a>
		<a href="{{site.forum}}">Community</a>
		<a href="{{site.market}}">Market</a>
		<a href="{{site.doc}}" class="active">Doc</a>
	</div>

	<!-- ── Layout ─────────────────────────────────────────────────── -->
	<div id="layout">

		<!-- Sidebar -->
		<aside id="sidebar" class="hide-on-print">

			<!-- Language selector -->
			{% if site.langs.size >= 2 %}
			<div class="lang-selector">
				<span class="lang-icon">language</span>
				<select id="lang-select">
					{% for lang in site.langs %}
					<option value="{{ lang }}">
						{% if lang == "fr_FR" %}Français
						{% elsif lang == "en_US" %}English
						{% elsif lang == "ru_RU" %}Русский
						{% elsif lang == "de_DE" %}Deutsch
						{% elsif lang == "es_ES" %}Español
						{% elsif lang == "it_IT" %}Italiano
						{% else %}{{ lang }}{% endif %}
					</option>
					{% endfor %}
				</select>
			</div>
			{% endif %}

			<!-- TOC (desktop) -->
			<div id="div_summary"></div>
		</aside>

		<!-- Content wrapper -->
		<div id="content-wrapper">

			<!-- Mobile TOC -->
			<div id="mobile-toc" class="hide-on-print">
				<div id="div_summary2"></div>
			</div>

			<!-- Print TOC -->
			<div id="div_summary3" class="show-on-print"></div>

			<!-- Page content -->
			<main id="div_content">
				{{content}}
			</main>

			<!-- Back to top -->
			<div id="bt_up" class="hide-on-print" role="button" aria-label="Retour en haut" tabindex="0">
				keyboard_arrow_up
			</div>

		</div><!-- /content-wrapper -->
	</div><!-- /layout -->

	<!-- Scripts — only jQuery (for jquery.toc.js) + toc + inview -->
	<script src="{{site.baseurl}}/assets/js/jquery-2.1.1.min.js"></script>
	<script src="{{site.baseurl}}/assets/js/jquery.inview.min.js"></script>
	<script src="{{site.baseurl}}/assets/js/jquery.toc.js"></script>
	<script>
		$(function () {
			var title = '{{ page.title }}';
			document.title = title + ' — Limad44 Documentation';

			/* ── Hamburger ── */
			var $toggle = $('#nav-toggle');
			var $drawer = $('#nav-drawer');

			$toggle.on('click', function () {
				var open = $drawer.hasClass('open');
				$drawer.toggleClass('open');
				$toggle.toggleClass('open');
				$toggle.attr('aria-expanded', !open);
				$drawer.attr('aria-hidden', open);
			});

			// Close drawer on outside click
			$(document).on('click', function (e) {
				if (!$(e.target).closest('#nav-toggle, #nav-drawer').length) {
					$drawer.removeClass('open');
					$toggle.removeClass('open');
				}
			});

			/* ── Language selector ── */
			var langMatch = /\/([a-z]{2}_[A-Z]{2})\//.exec(window.location.href);
			if (langMatch) { $('#lang-select').val(langMatch[1]); }

			$('#lang-select').on('change', function () {
				var match = /\/([a-z]{2}_[A-Z]{2})\//.exec(window.location.href);
				if (match) {
					window.location.href = window.location.href.replace(match[1], $(this).val());
				}
			});

			/* ── Build TOC ── */
			function buildTOC() {
				$('#div_summary, #div_summary2, #div_summary3').empty();

				var label = '<span class="toc-label">' + title + '</span>';
				var isMobile = window.innerWidth < 993;

				if (isMobile) {
					$('#div_content').toc({ renderIn: '#div_summary2', selectors: 'h1,h2' });
					$('#div_summary2').prepend(label);
				} else {
					$('#div_content').toc({ renderIn: '#div_summary', selectors: 'h1,h2' });
					$('#div_summary').prepend(label);
				}

				// Print TOC
				$('#div_content').toc({ renderIn: '#div_summary3', selectors: 'h1,h2' });
				$('#div_summary3').prepend(label);
			}

			buildTOC();

			var resizeTimer;
			$(window).on('resize orientationchange', function () {
				clearTimeout(resizeTimer);
				resizeTimer = setTimeout(buildTOC, 120);
			});

			/* ── Back to top ── */
			$('#bt_up').on('click keydown', function (e) {
				if (e.type === 'click' || e.key === 'Enter') {
					$('html, body').animate({ scrollTop: 0 }, 320);
				}
			});

			/* ── Number headings ── */
			var i = 1, j = 1;
			$('h1, h2', '#div_content').each(function () {
				var tag = this.tagName.toLowerCase();
				if (tag === 'h1') {
					$(this).text(i + ') ' + $(this).text());
					i++; j = 1;
				} else {
					$(this).text((i - 1) + '.' + j + ') ' + $(this).text());
					j++;
				}
			});
		});

		/* ── Active TOC highlight ── */
		var idChapitre = null, idAncre = null;
		$('#div_content h1, #div_content h2').on('inview', function (event, isInView) {
			idAncre = $(this).attr('id');
			if (isInView) {
				$('a[href="#' + idAncre + '"]').addClass('active');
				if (idChapitre) {
					$('a[href="#' + idChapitre + '"]').removeClass('active');
					idChapitre = null;
				}
			} else if ($('a.active').length > 1) {
				$('a[href="#' + idAncre + '"]').removeClass('active');
			} else {
				idChapitre = idAncre;
			}
			$('#div_summary3 a').removeClass('active');
		});
	</script>

</body>

</html>
