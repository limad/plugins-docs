<!DOCTYPE html>
<html lang="{{page.lang}}">

<head>
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet" href="{{site.baseurl}}/assets/css/materialize.min.css">
	<link rel="icon" type="image/png" href="{{site.baseurl}}/favicon.ico">
	<link rel="stylesheet" href="{{site.baseurl}}/assets/css/styles.css">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="Content-Language" content="{{ page.lang }}">
</head>

<body>
	<div class="navbar-fixed hide-on-print">
		<nav>
			<div class="nav-wrapper container">
				<a id="logo-container" href="" class="brand-logo center"><img
						src="{{site.market}}/filestore/market/plugin/images/{{page.pluginId}}_icon.png"
						style="height:50px;margin-top:5px" class="responsive-img" /></a>
				<ul class="left hide-on-med-and-down">
					<li><a href="{{site.baseurl}}">Limad44 Documentation</a></li>
					<li>> {{page.title}}</li>
				</ul>
				<ul class="right hide-on-med-and-down">
					<li><a href="{{site.www}}">Site</a></li>
					<li><a href="{{site.blog}}">Blog</a></li>
					<li><a href="{{site.forum}}">Community</a></li>
					<li><a href="{{site.market}}">Market</a></li>
					<li class="active"><a href="{{site.doc}}">Doc</a></li>
				</ul>
				<ul class="side-nav" id="nav-mobile">
					<li><a href="{{site.blog}}">Blog</a></li>
					<li><a href="{{site.forum}}">Community</a></li>
					<li><a href="{{site.market}}">Market</a></li>
					<li class="active"><a href="{{site.doc}}">Doc</a></li>
				</ul>
			</div>
		</nav>
	</div>
	<div class="row" id="div_main">
		<div id="side-nav" class="side-nav fixed hide-on-print">
			<div class="container">
				<div class="row">
					{% if site.langs.size >= 2 %}
					<div class="col s2">
						<i class="material-icons" style="position: relative;top:15px;">language</i>
					</div>
					<div class="col s10">
						<select class="sel_lang">
							{% for lang in site.langs %}
							<option data-href="index{% if lang != " fr_FR" %}-{{ lang }}{% endif %}.html"
								value="{{ lang }}">{% if lang == "fr_FR" %}Français{% endif %}{% if lang == "en_US"
								%}English{% endif %}{% if lang == "ru_RU" %}Russe{% endif %}{% if lang == "de_DE"
								%}Deutsch{% endif %}{% if lang == "es_ES" %}Spanish{% endif %}{% if lang == "it_IT"
								%}Italien{% endif %}{% if lang == "id_ID" %}Indien{% endif %}</option>
							{% endfor %}
						</select>
					</div>
					{% endif %}
				</div>
			</div>
			<div id="div_summary" style="margin-top:-45px;padding-bottom: 45px;"></div>
		</div>
		<div>
			<i class="material-icons hide-on-print" id="bt_up"
				style="position:fixed;bottom:10px;right:10px;cursor: pointer;font-size:3em;">keyboard_arrow_up</i>
			<div class="hide-on-large-only hide-on-print" id='div_menuMobile'>
				<div class="row">
					<div class="col s2">
						<i class="material-icons" style="position: relative;top:15px;left:20px;">language</i>
					</div>
					<div class="col s10">
						<select class="sel_lang">
							{% if site.langs.size >= 2 %}
							{% for lang in site.langs %}
							<option value="{{ lang }}">{% if lang == "fr_FR" %}Français{% endif %}{% if lang == "en_US"
								%}English{% endif %}{% if lang == "ru_RU" %}Russe{% endif %}{% if lang == "de_DE"
								%}Deutsch{% endif %}{% if lang == "es_ES" %}Spanish{% endif %}{% if lang == "it_IT"
								%}Italien{% endif %}{% if lang == "id_ID" %}Indien{% endif %}</option>
							{% endfor %}
							{% endif %}
						</select>
					</div>
				</div>
				<div id="div_summary2"></div>
			</div>
			<div id="div_summary3" style="display: none;" class="show-on-print"></div>
			<div id="div_content">
				{{content}}
			</div>
		</div>
	</div>
	<script type="text/javascript" src="{{site.baseurl}}/assets/js/jquery-2.1.1.min.js" defer></script>
	<script type="text/javascript" src="{{site.baseurl}}/assets/js/materialize.min.js" defer></script>
	<script type="text/javascript" src="{{site.baseurl}}/assets/js/jquery.inview.min.js" defer></script>
	<script type="text/javascript" src="{{site.baseurl}}/assets/js/jquery.toc.js" defer></script>
	<script type="text/javascript">
		$(function () {
			var title = '{{page.title}}';
			var titlePlugin = title.charAt(0).toUpperCase() + title.substring(1).toLowerCase();
			var $docTitle = $('#doc_title');
			var $divMain = $('#div_main');
			var $divContent = $('#div_content');
			var $divSummary = $('#div_summary');
			var $divSummary2 = $('#div_summary2');
			var $divSummary3 = $('#div_summary3');
			var $selLang = $('.sel_lang');
			var resizeTimer;

			function setMeta() {
				document.title = 'Documentation Jeedom | ' + title[0].toUpperCase() + title.substring(1);
				$('meta[name=description]').remove();
				$('head').append('<meta name="description" content="Ceci est la documentation du plugin "' + title[0].toUpperCase() + title.substring(1) + '", lier à la solution domotique Jeedom.">');
			}

			function updateToc() {
				$divSummary.add($divSummary2).add($divSummary3).empty();
				if (window.innerWidth < 992) {
					$divMain.addClass('container');
					$divContent.toc({ renderIn: "#div_summary2", selectors: 'h1,h2' });
				} else {
					$divMain.removeClass('container');
					$divContent.toc({ renderIn: "#div_summary", selectors: 'h1,h2' });
				}
				$divContent.toc({ renderIn: "#div_summary3", selectors: 'h1,h2' });
				$divSummary.add($divSummary2).add($divSummary3).find('#toctitle').html('<h2 style="padding-left:5px !important;">' + titlePlugin + '</h2>');
				$('.toclevel-2').parent().css('color', 'blue');
			}

			function setLangFromUrl() {
				var regex = /\/([a-z]{2}_[A-Z]{2})\//g;
				var corresp = regex.exec(window.location.href);
				if (corresp && corresp[1]) {
					$selLang.val(corresp[1]);
				}
			}

			function setLangChangeHandler() {
				$selLang.on('change', function () {
					var regex = /\/([a-z]{2}_[A-Z]{2})\//g;
					var corresp = regex.exec(window.location.href);
					var url = window.location.href.replace(corresp[1], $(this).find('option:selected').attr('value'));
					if (url.endsWith('/')) {
						url += 'index';
					}
					window.location.href = url;
				});
			}

			function buildChapterNumbers() {
				var i = 1,
					j = 1;
				$divContent.find('h1, h2').each(function () {
					var $el = $(this);
					if ($el.is('h1')) {
						$el.text(i + ') ' + $el.text());
						i++;
					}
					if ($el.is('h2')) {
						$el.text((i - 1) + '.' + j + ') ' + $el.text());
						j++;
					} else {
						j = 1;
					}
				});
			}

			function init() {
				$divContent.find('img').addClass('responsive-img');
				$divContent.find('table').addClass('striped');
				updateToc();
				buildChapterNumbers();
			}

			function onResize() {
				clearTimeout(resizeTimer);
				resizeTimer = setTimeout(init, 150);
			}

			$docTitle.append(title);
			setMeta();
			$('.button-collapse').sideNav();
			$('select').material_select();
			setLangFromUrl();
			setLangChangeHandler();
			$('#bt_up').on('click', function () {
				window.scrollTo(0, 0);
			});
			$(window).on('orientationchange resize', onResize);
			init();
		});

		var idChapitre = null,
			nbrChapitre = 0,
			idAncre = null;
		$('#div_content h1, #div_content h2').on('inview', function (event, isInView) {
			nbrChapitre = $('a.active').length;
			idAncre = $(this).attr('id');
			if (isInView) {
				$('a[href="#' + idAncre + '"]').addClass('active');
				if (idChapitre != null) {
					$('a[href="#' + idChapitre + '"]').removeClass('active');
					idChapitre = null;
				}
			} else if (nbrChapitre > 1) {
				$('a[href="#' + idAncre + '"]').removeClass('active');
			} else {
				idChapitre = idAncre;
			}
			$('#div_summary3 a').removeClass('active');
		});
	</script>
</body>

</html>
